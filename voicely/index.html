<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Voicely Legal</title>
    <meta name="description" content="Legal documents for Voicely." />
    <link rel="icon" href="/assets/favicon.png" type="image/png" />
    <style>
      :root {
        --bg: #f6f4ef;
        --paper: #fffdfa;
        --text: #161b24;
        --muted: #5e6575;
        --accent: #6a4b1f;
        --line: rgba(22, 27, 36, 0.1);
        --shadow: 0 24px 70px rgba(22, 27, 36, 0.08);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100dvh;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at top right, rgba(106, 75, 31, 0.1), transparent 30%),
          linear-gradient(180deg, #f3ede4 0%, var(--bg) 100%);
      }

      main {
        width: min(760px, calc(100% - 32px));
        margin: 0 auto;
        padding: 44px 0 72px;
      }

      .eyebrow {
        margin: 0 0 10px;
        color: var(--accent);
        font-size: 0.82rem;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-family: "Georgia", "Times New Roman", serif;
        font-size: clamp(2.2rem, 7vw, 3.6rem);
        line-height: 1.05;
      }

      .intro {
        max-width: 38rem;
        margin: 14px 0 30px;
        color: var(--muted);
        font-size: 1rem;
        line-height: 1.7;
      }

      .links {
        display: grid;
        gap: 12px;
      }

      .card {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 18px;
        padding: 18px;
        border: 1px solid var(--line);
        border-radius: 18px;
        background: var(--paper);
        color: inherit;
        text-decoration: none;
        box-shadow: var(--shadow);
      }

      .card strong {
        display: block;
        margin-bottom: 4px;
        color: var(--text);
        font-size: 1.04rem;
      }

      .card span {
        color: var(--muted);
        font-size: 0.94rem;
      }

      .arrow {
        color: var(--accent);
        font-size: 1.4rem;
      }

      a:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 4px;
      }
    </style>
  </head>
  <body>
    <main>
      <p class="eyebrow">Voicely</p>
      <h1>Legal</h1>
      <p class="intro">
        Legal documents for the Voicely mobile app.
      </p>

      <div class="links">
        <a class="card" href="/voicely/privacy/">
          <span>
            <strong>Privacy Policy</strong>
            <span>How Voicely handles data and privacy.</span>
          </span>
          <span class="arrow" aria-hidden="true">→</span>
        </a>

        <a class="card" href="/voicely/terms/">
          <span>
            <strong>Terms of Use</strong>
            <span>Rules and conditions for using Voicely.</span>
          </span>
          <span class="arrow" aria-hidden="true">→</span>
        </a>
      </div>
    </main>
  </body>
</html>
